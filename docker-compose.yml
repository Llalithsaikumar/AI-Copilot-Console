services:
  backend:
    build: .
    environment:
      ENV: dev
      PUBLIC_API_URL: http://localhost:8000
      STORAGE_BACKEND: sqlite
      DATA_DIR: /app/data
      SQLITE_PATH: /app/data/copilot.sqlite3
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
